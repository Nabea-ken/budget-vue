<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.datatables.net/v/bs5/jq-3.7.0/dt-2.3.7/datatables.min.css"
      rel="stylesheet"
    />
    <title>Budget</title>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">BUDGET APP</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav">
            <a class="nav-link" href="login.html">Login</a>
            <a class="nav-link" href="register.html">Register</a>
            <a class="nav-link active" href="index.html">Budget</a>
            <a class="nav-link" href="#" @click="logoutUser">Logout</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="container mt-4" id="app">
      <h2>Add Budget</h2>

      <form @submit.prevent="addBudget">
        <div class="mb-3">
          <input
            v-model="form.title"
            type="text"
            class="form-control"
            placeholder="Enter budget title"
          />
        </div>

        <div class="mb-3">
          <input
            v-model="form.amount"
            type="number"
            class="form-control"
            placeholder="Enter amount"
          />
        </div>

        <div class="mb-3">
          <input
            v-model="form.date"
            type="date"
            class="form-control"
          />
        </div>

        <button type="submit" class="btn btn-primary">Add Budget</button>
      </form>

      <div class="alert alert-success mt-3" v-if="alertSuccessShow" role="alert">
        {{ alertMessage }}
      </div>

      <div class="alert alert-danger mt-3" v-if="alertErrorShow" role="alert">
        {{ alertMessage }}
      </div>

      <h2 class="mt-4">My Budget List</h2>

      <table id="myTable" class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Amount</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="budget in budgets" :key="budget.id">
            <td>{{ budget.id }}</td>
            <td>{{ budget.title }}</td>
            <td>{{ budget.amount }}</td>
            <td>{{ budget.date }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/v/bs5/jq-3.7.0/dt-2.3.7/datatables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
      new Vue({
        el: "#app",
        data: {
          budgets: [],
          form: {
            title: "",
            amount: "",
            date: ""
          },
          alertMessage: "",
          alertSuccessShow: false,
          alertErrorShow: false,
          token: localStorage.getItem("token") || "",
          url: "http://127.0.0.1:5000"
        },

        methods: {
          showSuccess(message) {
            this.alertMessage = message;
            this.alertSuccessShow = true;
            this.alertErrorShow = false;

            setTimeout(() => {
              this.alertSuccessShow = false;
            }, 2000);
          },

          showError(message) {
            this.alertMessage = message;
            this.alertErrorShow = true;
            this.alertSuccessShow = false;

            setTimeout(() => {
              this.alertErrorShow = false;
            }, 3000);
          },

          addBudget() {
            if (!this.form.title || !this.form.amount || !this.form.date) {
              this.showError("All fields are required");
              return;
            }

            axios.post(
              this.url + "/budget",
              {
                title: this.form.title,
                amount: this.form.amount,
                date: this.form.date
              },
              {
                headers: {
                  Authorization: `Bearer ${this.token}`
                }
              }
            )
            .then((response) => {
              this.showSuccess(response.data.message || "Budget added successfully");
              this.form = {
                title: "",
                amount: "",
                date: ""
              };
              this.fetchBudgets();
            })
            .catch((error) => {
              this.showError(
                error.response?.data?.message ||
                error.response?.data?.error ||
                "Error adding budget"
              );
            });
          },

          fetchBudgets() {
            axios.get(this.url + "/budget", {
              headers: {
                Authorization: `Bearer ${this.token}`
              }
            })
            .then((response) => {
              this.budgets = response.data.budgets || [];

              this.$nextTick(() => {
                if ($.fn.DataTable.isDataTable("#myTable")) {
                  $("#myTable").DataTable().destroy();
                }

                $("#myTable").DataTable();
              });
            })
            .catch((error) => {
              this.showError(
                error.response?.data?.message ||
                error.response?.data?.error ||
                "Failed to load budgets"
              );
            });
          },

          logoutUser() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
          }
        },

        mounted() {
          if (this.token) {
            this.fetchBudgets();
          } else {
            window.location.href = "login.html";
          }
        }
      });
    </script>
  </body>
</html>
